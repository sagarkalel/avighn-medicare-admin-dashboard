<!doctype html>
<html>
  <head>
    <base href="$FLUTTER_BASE_HREF" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Avighn Medicare Admin Dashboard"
    />
    <title>Avighn Medicare — Admin</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #f8fafb;
        overflow: hidden;
      }
      #splash {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #f8fafb;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        font-family: -apple-system, sans-serif;
        transition: opacity 0.4s;
      }
      .logo {
        width: 64px;
        height: 64px;
        background: #00897b;
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .logo svg {
        width: 32px;
        height: 32px;
        fill: white;
      }
      h1 {
        font-size: 22px;
        font-weight: 700;
        color: #0f172a;
        margin: 0 0 4px;
      }
      p {
        font-size: 13px;
        color: #94a3b8;
        margin: 0 0 28px;
      }
      .bar {
        width: 180px;
        height: 3px;
        background: #e2e8f0;
        border-radius: 10px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #00897b, #4db6ac);
        border-radius: 10px;
        animation: slide 1.2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(0.95);
        }
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo">
        <svg viewBox="0 0 24 24">
          <path
            d="M10.5 2.25a.75.75 0 01.75.75v7.5h7.5a.75.75 0 010 1.5h-7.5v7.5a.75.75 0 01-1.5 0v-7.5H2.25a.75.75 0 010-1.5h7.5V3a.75.75 0 01.75-.75z"
          />
        </svg>
      </div>
      <h1>Avighn Medicare</h1>
      <p>Admin Dashboard</p>
      <div class="bar"><div class="fill"></div></div>
    </div>
    <script>
      window.addEventListener("flutter-first-frame", function () {
        var s = document.getElementById("splash");
        if (s) {
          s.style.opacity = "0";
          setTimeout(() => (s.style.display = "none"), 400);
        }
      });
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
